name: Summarize new issues

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: issue-summary-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: |
            Summarize the following GitHub issue in one concise paragraph.
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body || 'No description provided.' }}

      - name: Comment with AI summary
        uses: actions/github-script@v7
        with:
          script: |
            const summary = ${{ toJSON(steps.inference.outputs.response) }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });
